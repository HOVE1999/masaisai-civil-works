<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masaisai Civil Works</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #0f1720;
  color: #fff;
}

/* HEADER */
header {
  background: #0f1720;
  padding: 80px 20px;
  text-align: center;
}

header h1 {
  color: #d4af37;
  font-size: 2.5rem;
  margin-bottom: 10px;
}

header p {
  margin-bottom: 20px;
}

.btn {
  background: #d4af37;
  color: black;
  padding: 12px 20px;
  text-decoration: none;
  border-radius: 5px;
  font-weight: bold;
}

/* SECTION */
.section {
  padding: 60px 20px;
  text-align: center;
}

.section h2 {
  color: #d4af37;
  margin-bottom: 20px;
}

/* SERVICES */
.services {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.card {
  background: #1a2530;
  padding: 20px;
  border-radius: 10px;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.gallery img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  border-radius: 12px;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* CONTACT */
.contact {
  background: #1a2530;
  padding: 30px;
  border-radius: 10px;
  margin-top: 20px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: #0a1017;
}
</style>
</head>

<body>

<header>
  <h1>MASAISAI CIVIL WORKS</h1>
  <p>Professional Construction & Finishing Services</p>
  <a class="btn" href="https://wa.me/263786596759">WhatsApp Us</a>
</header>

<section class="section">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">Ceiling Installation</div>
    <div class="card">Interior Finishing</div>
    <div class="card">Renovations</div>
    <div class="card">Civil Works</div>
  </div>
</section>

<section class="section">
  <h2>Our Projects</h2>
  <div class="gallery">

    <!-- BEFORE (unpainted) -->
    <img src="project1.jpg">

    <!-- AFTER ceiling -->
    <img src="project2.jpg">

    <!-- FULL ROOM -->
    <img src="project3.jpg">

  </div>
</section>

<section class="section">
  <h2>Contact</h2>
  <div class="contact">
    <p><strong>Phone:</strong> +263 78 659 6759</p>
    <p><strong>Email:</strong> aldridgehove@gmail.com</p>
    <p><strong>Address:</strong> 32 Cork Road, Harare</p>
  </div>
</section>

<footer>
  <p>© 2026 Masaisai Civil Works</p>
</footer>

</body>
</html>
